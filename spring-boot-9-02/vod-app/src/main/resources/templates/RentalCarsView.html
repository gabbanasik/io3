<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wypożyczalnia Aut - Salony</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>AutoRent</h1></a>
    <h2 th:text="${model}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Logo</th>
            <th>Nazwa salonu</th>
            <th>Dostępne auta</th>
        </tr>
        <tr th:each="rentalCar : ${rentalCars}">
            <td>
                <img th:src="${rentalCar.logo}" alt="Logo salonu" width="100"/>
            </td>
            <td th:text="${rentalCar.name}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/cars(rentalCarID=${rentalCar.id})}">Pokaż auta</a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">

</div>
<footer>
    <span th:text="${tip}"></span>
</footer>

</body>
</html>
