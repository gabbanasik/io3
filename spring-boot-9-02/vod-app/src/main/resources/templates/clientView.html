<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wypożyczalnia Aut - Klienci</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>AutoRent</h1></a>
    <h2 th:text="${title}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Imię</th>
            <th>Nazwisko</th>
        </tr>
        <tr th:each="c : ${clients}">
            <td th:text="${c.firstName}"></td>
            <td>
                <a th:href="@{/cars?clientId={id}(id=${c.id})}"
                   th:text="${c.lastName}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">

</div>
<footer>
    <span th:text="${tip}"></span>
</footer>

</body>
</html>
